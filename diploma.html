<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Դիպլոմային</title>
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23818cf8' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><path d='M22 10v6M2 10l10-5 10 5-10 5z'/><path d='M6 12v5c3 3 9 3 12 0v-5'/></svg>"
        type="image/svg+xml">
    <style>
        :root {
            /* Default Dark Mode Theme */
            --primary-gradient: linear-gradient(135deg, #818cf8 0%, #c084fc 100%);
            --bg-color: #111827;
            --text-main: #f9fafb;
            --text-muted: #9ca3af;
            --glass-bg: rgba(31, 41, 55, 0.75);
            --glass-border: rgba(255, 255, 255, 0.1);
            --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            --border-color: #374151;
            --locked-bg: rgba(17, 24, 39, 0.8);
            --locked-text: #6b7280;
            --focus-ring: #818cf8;
            --success-color: #34d399;
            --row-hover: rgba(55, 65, 81, 0.5);
            --th-bg: rgba(31, 41, 55, 0.9);
        }

        .light-mode {
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --bg-color: #f3f4f6;
            --text-main: #1f2937;
            --text-muted: #6b7280;
            --glass-bg: rgba(255, 255, 255, 0.85);
            --glass-border: rgba(255, 255, 255, 0.4);
            --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            --border-color: #e5e7eb;
            --locked-bg: #f9fafb;
            --locked-text: #9ca3af;
            --focus-ring: #667eea;
            --success-color: #10b981;
            --row-hover: rgba(249, 250, 251, 0.5);
            --th-bg: rgba(249, 250, 251, 0.8);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            color: var(--text-main);
            background-color: var(--bg-color);
            line-height: 1.5;
            min-height: 100vh;
            padding: 1rem;
            position: relative;
            overflow-x: hidden;
        }

        .app-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: var(--primary-gradient);
            z-index: -1;
            opacity: 0.15;
        }

        /* Abstract shapes for premium feel */
        .app-background::before,
        .app-background::after {
            content: '';
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            z-index: -1;
        }

        .app-background::before {
            width: 400px;
            height: 400px;
            background: #667eea;
            top: -100px;
            left: -100px;
            opacity: 0.5;
        }

        .app-background::after {
            width: 300px;
            height: 300px;
            background: #764ba2;
            bottom: -50px;
            right: -50px;
            opacity: 0.5;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 1rem;
            box-shadow: var(--glass-shadow);
            padding: 1.5rem;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .header {
            text-align: center;
        }

        .header-top {
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            margin-bottom: 0.5rem;
        }

        .header-top h1 {
            font-size: 1.75rem;
            font-weight: 700;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin: 0;
        }

        .theme-toggle {
            position: absolute;
            right: 0;
            background: transparent;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 0.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: background-color 0.2s, color 0.2s;
        }

        .modal-content {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 1rem;
            box-shadow: var(--glass-shadow);
            padding: 2rem;
            width: 90%;
            max-width: 400px;
            text-align: center;
            transform: translateY(0);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .theme-toggle:hover {
            background-color: var(--glass-border);
            color: var(--text-main);
        }

        .theme-toggle svg {
            width: 24px;
            height: 24px;
        }

        .theme-toggle .hidden {
            display: none;
        }

        .header p {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-bottom: 1.5rem;
        }

        .search-container {
            position: relative;
            max-width: 500px;
            margin: 0 auto;
        }

        .search-icon {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            width: 1.25rem;
            height: 1.25rem;
            color: var(--text-muted);
        }

        #searchInput {
            width: 100%;
            padding: 0.875rem 1rem 0.875rem 2.75rem;
            border-radius: 2rem;
            border: 1px solid var(--border-color);
            background: rgba(255, 255, 255, 0.9);
            font-size: 1rem;
            font-family: inherit;
            outline: none;
            transition: all 0.2s ease;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.02);
        }

        #searchInput:focus {
            border-color: var(--focus-ring);
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.2);
        }

        /* Custom Modal Styling */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            opacity: 1;
            transition: opacity 0.3s ease;
        }

        .modal-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .main-content {
            padding: 0;
            overflow: hidden;
        }

        .table-responsive {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th {
            background-color: var(--th-bg);
            color: var(--text-muted);
            font-weight: 600;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            padding: 1rem;
            border-bottom: 2px solid var(--border-color);
            white-space: nowrap;
        }

        td {
            padding: 1rem;
            border-bottom: 1px solid var(--border-color);
            vertical-align: middle;
        }

        tr {
            transition: background-color 0.2s ease;
        }

        tr:hover {
            background-color: var(--row-hover);
        }

        tr:last-child td {
            border-bottom: none;
        }

        .col-id {
            width: 5%;
            color: var(--text-muted);
            font-weight: 500;
        }

        .col-theme {
            width: 55%;
            font-weight: 500;
            line-height: 1.4;
        }

        .col-student {
            width: 40%;
        }

        .student-input-container {
            display: flex;
            gap: 0.5rem;
        }

        .student-input {
            flex: 1;
            padding: 0.6rem 0.75rem;
            border-radius: 0.5rem;
            border: 1px solid var(--border-color);
            font-family: inherit;
            font-size: 0.95rem;
            outline: none;
            transition: all 0.2s ease;
            width: 100%;
        }

        .student-input:focus {
            border-color: var(--focus-ring);
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .locked-name-display {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background-color: var(--locked-bg);
            border: 1px solid var(--border-color);
            padding: 0.6rem 0.75rem;
            border-radius: 0.5rem;
            width: 100%;
        }

        .name-text {
            font-weight: 500;
            color: var(--text-main);
        }

        .confirm-btn {
            background: var(--primary-gradient);
            color: white;
            border: none;
            border-radius: 0.5rem;
            padding: 0 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .confirm-btn:hover {
            opacity: 0.9;
        }

        .confirm-btn:active {
            transform: scale(0.95);
        }

        .confirm-btn.hidden {
            display: none;
        }

        .locked-indicator {
            color: var(--success-color);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 0.5rem;
        }

        .locked-indicator.hidden {
            display: none;
        }

        .no-results {
            padding: 3rem;
            text-align: center;
            color: var(--text-muted);
        }

        .no-results.hidden {
            display: none;
        }

        .modal-content h3 {
            margin-bottom: 1rem;
            font-size: 1.5rem;
            font-weight: 700;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .modal-content p {
            color: var(--text-muted);
            font-size: 1.05rem;
            margin-bottom: 2rem;
            line-height: 1.5;
        }

        .modal-actions {
            display: flex;
            gap: 1rem;
            justify-content: center;
        }

        .modal-actions button {
            padding: 0.75rem 1.5rem;
            border-radius: 0.5rem;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            border: none;
            transition: all 0.3s ease;
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-cancel {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-main);
        }

        .btn-cancel:hover {
            background: var(--row-hover);
            border-color: var(--text-muted);
        }

        .btn-confirm {
            background: var(--primary-gradient);
            color: white;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-confirm:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }

        /* Mobile optimizations */
        @media (max-width: 768px) {
            body {
                padding: 0.5rem;
            }

            .glass-panel {
                border-radius: 0.75rem;
                padding: 1rem;
            }

            .header h1 {
                font-size: 1.5rem;
            }

            #searchInput {
                background: var(--glass-bg);
                color: var(--text-main);
            }

            table,
            thead,
            tbody,
            th,
            td,
            tr {
                display: block;
            }

            thead tr {
                position: absolute;
                top: -9999px;
                left: -9999px;
            }

            tr {
                border-bottom: 2px solid var(--border-color);
                padding: 1rem 0;
                display: flex;
                flex-wrap: wrap;
                align-items: flex-start;
            }

            tr:last-child {
                border-bottom: none;
            }

            td {
                border: none;
                padding: 0 1rem;
                position: relative;
            }

            .col-id {
                width: auto;
                color: var(--success-color);
                font-weight: bold;
                font-size: 1.1rem;
                padding-right: 0.5rem;
            }

            .col-theme {
                width: 0;
                flex-grow: 1;
                padding-bottom: 0.75rem;
                font-size: 1.05rem;
                line-height: 1.3;
            }

            .col-student {
                width: 100%;
                background-color: var(--row-hover);
                border-radius: 0.5rem;
                padding: 1rem;
                margin-top: 0.5rem;
            }
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="app-background"></div>

    <div class="container">
        <header class="glass-panel header">
            <div class="header-top">
                <h1>Դիպլոմային թեմաների ընտրություն</h1>
                <button id="themeToggle" class="theme-toggle" aria-label="Toggle dark/light mode">
                    <svg class="sun-icon hidden" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="5"></circle>
                        <line x1="12" y1="1" x2="12" y2="3"></line>
                        <line x1="12" y1="21" x2="12" y2="23"></line>
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                        <line x1="1" y1="12" x2="3" y2="12"></line>
                        <line x1="21" y1="12" x2="23" y2="12"></line>
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                    </svg>
                    <svg class="moon-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                    </svg>
                </button>
            </div>
            <p>Ընտրեք ձեր նախընտրած դիպլոմային թեման՝ մուտքագրելով ձեր անունն ու ազգանունը:</p>

            <div class="search-container">
                <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
                <input type="text" id="searchInput" placeholder="Որոնել թեմա..." aria-label="Որոնել թեմա">
            </div>
        </header>

        <main class="glass-panel main-content">
            <div class="table-responsive">
                <table id="themesTable">
                    <thead>
                        <tr>
                            <th class="col-id">#</th>
                            <th class="col-theme">Թեմա</th>
                            <th class="col-student">Ուսանողի Անուն Ազգանուն</th>
                        </tr>
                    </thead>
                    <tbody id="themesBody">
                        <!-- Rows will be injected here via JavaScript -->
                    </tbody>
                </table>
            </div>

            <div id="noResults" class="no-results hidden">
                <p>Ձեր որոնմանը համապատասխանող թեմա չգտնվեց:</p>
            </div>
        </main>
    </div>

    <!-- Custom Modal -->
    <div id="customModal" class="modal-overlay hidden">
        <div class="glass-panel modal-content">
            <h3 id="modalTitle">Հաստատում</h3>
            <p id="modalMessage">Համոզվա՞ծ եք:</p>
            <div class="modal-actions">
                <button id="modalBtnCancel" class="btn-cancel">Չեղարկել</button>
                <button id="modalBtnConfirm" class="btn-confirm">Հաստատել</button>
            </div>
        </div>
    </div>



    <script>
        const LOCAL_THEMES_DATA = [
            "ՀՀ ֆինանսական քաղաքականության դերը մակրոտնտեսական կայունության ապահովման գործում",
            "Ֆինանսական կայունության ապահովման հիմնախնդիրները Հայաստանի Հանրապետությունում",
            "ՀՀ բանկային համակարգի դերը ֆինանսական կայունութան պահպանման գործընթացում:",
            "Ֆինանսական ճգնաժամերի կանխարգելման և հետնանքների հաղթահարման քաղաքականությունը Հայաստանի Հանրապետությունում",
            "ՀՀ ֆինանսական շուկայի զարգացման հնարավորությունները թվային տեխնոլոգիաների կիրառման համատեքստում",
            "ՀՀ ֆինանսական շուկայի զարգացման մակարդակի ազդեցությունը տնտեսական աճի վրա",
            "Արժեթղթերի շուկայի հիմնախնդիրները և զարգացման հեռանկարները Հայաստանի Հանրապետությունում",
            "ՀՀ ֆինանսական շուկայի կարգավորման և վերահսկման քաղաքականության բարելավման ուղղությունները",
            "Ֆինանսական նորարարությունների զարգացման ազդեցությունը ՀՀ ֆինանսական շուկայի վրա",
            "Ֆինանսական ներառականության մակարդակի բարձրացման դերը ՀՀ ֆինանսական շուկայի զարգացման համատեքստում",
            "ՀՀ-ում ֆինանսական կայունության ցուցանիշների դինամիկայի վերլուծությունը 2020-2025թթ.:",
            "Մակրոպրուդենցիալ քաղաքականության դերը ֆինանսական ճգնաժամերի կանխարգելման գործում /ՀՀ օրինակով/",
            "ՀՀ պետական պարտքի կայունության ապահովման հիմնախնդիրները",
            "Արտաքին ֆինանսական հոսքերի ազդեցությունը ՀՀ մակրոֆինանսական կայունության վրա",
            "Փոխարժեքի տատանումների մակրոտնտեսական հետնանքների վերլուծությունը /ՀՀ օրինակով/",
            "Կապիտալի շարժի ազդեցությունը ՀՀ ֆինանսական համակարգի կայունության վրա",
            "ՀՀ. սպառողական վարկերի կառուցվածքի և դինամիկայի վերլուծությունը 2020- 2025թթ.",

            "(Թվային բանկինգի զարգացման միտումները ՀՀ բանկերում (կազմակերպության օրինակով)",
            "Բիզնեսի ֆինանսավորման ժամանակակից աղբյուրները և դրանց մատչելիությունը ՀՀում",
            "Բիզնեսի կենսունակության բարձրացման հիմնախնդիրները  ՀՀ ՓՄՁ ոլորտում",
            "Բիզնեսի պլանը որպես ներդրումային նախագիծ և դրա արդյունավետության գնահատումը (կազմակերպության օրինակով)",
            "Կապիտալի միջին կշռված արժեքը (WACC) և դրա բաղադրիչները որպես բիզնեսի գնահատման առանցքային գործոն և դրա կիրառությունը (կազմակերպության օրինակով)",
            "Մարդկային ռեսուրսների ռազմավարական կառավարման դերը փոքր և միջին ձեռնարկությունների մրցունակության և արդյունավետության ձնավորման գործընթացում (կազմակերպության օրինակով)",
            "ճգնաժամային կառավարման գործիքների կիրառման փորձը և դրանց արդյունավետությունը կազմակերպություններում (կազմակերպության օրինակով)",
            "Փոքր և միջին ձեռնարկությունների ֆինանսական գործունեության վրա հարկային քաղաքականության ազդեցության գնահատման մեթոդաբանական մոտեցումները (Հայաստանի Հանրապետության օրինակով)",
            "Բանկային կառավարչական որոշումների ընդունման գործընթացում ֆինանսական վերլուծության դերի գնահատման մեթոդաբանական մոտեցումները (առևտրային բանկի օրինակով)",
            "Թվային բանկային ծառայությունների ներդրման և զարգացման ազդեցությունը բանկերի հաճախորդների սպասարկման արդյունավետության վրա (առևտրային բանկի օրինակով)",
            "Գնագոյացման ռազմավարությունների դերը կազմակերպությունների շահութաբերության և մրցակցային դիրքի ապահովման գործում",
            "Վարկային ռիսկերի կառավարման համակարգի կիրառման փորձը և դրա արդյունավետությունը Հայաստանի Հանրապետության առևտրային բանկերում",
            "Կապիտալի շուկայի զարգացման արդի մարտահրավերները և դրանց հաղթահարման հնարավորությունները Հայաստանի Հանրապետությունում",
            "Ֆինանսական շուկաների թվայնացման ազդեցությունը ներդրումային ակտիվության վրա ՀՀ-ում",
            "Թվայնացման գործընթացների արդյունավետությոնն ու կատարելագործման մեխանիզմները ՀՀ մաքսային համակարգում",
            "Արհեստական բանականության կիրառոմը մաքսային հայտարարագրերի ավտոմատացված վերլոծության գործընթացում. միջազգային փորձ և ներդրման հեռանկարներ ՀՀ-ում",
            "Անձնակազմի ուսուցման և զարգացման դերը հոսունության կրճատման գործում (ՀՀ բանկային ոլորտում)",
            "Անձնակազմի աշխատանքի արդյունքների գնահատման առանձնահատկությունները ֆինանսական ոլորտի կազմակերպություններում (կազմակերպության օրինակով)",
            "Վարկային ռիսկի գնահատումը և կառավարումը ՀՀ բանկի օրինակով",
            "Առողջության համընդհանուր ապահովագրությունը, որպես սոցիալական հիմնախնդրի լուծման բանալի",
            "Կանաչ վարկավորման մեխանիզմների ներդրման խնդիրները և հեռանկարները ՀՀ առևտրային բանկերում",
            "Էներգաարդյունավետության ֆինանսավորման ազդեցությունը բանկի վարկային պորտֆելի որակի վրա",
            "Բանկերի դերը «ցածր ածխածնային» տնտեսությանն անցնելու գործընթացում:",
            "Էկոլոգիական ռիսկերի գնահատումը վարկավորման որոշման գործընթացում:",
            "ESG գործոնների ազդեցությունը ներդրումային պորտֆելի եկամտաբերության վրա:",
            "Կանաչ պարտատոմսերի (Շոօօո Bonds) շուկայի զարգացման հեռանկարները զարգացող երկրներում:",
            "Ինստիտուցիոնալ ներդրողների դերը կորպորատիվ սոցիալական պատասխանատվության խթանման գործում:",
            "Կլիմաական ռիսկերի ինտեգրումը ֆինանսական ինստիտուտների սթրեսթեստավորման համակարգում:",
            "ՀՀ Կենտրոնական բանկերի «կանաչ» քաղաքականությունը, որպես դրամավարկային կարգավորման նոր գործիք:",
            "Ֆինթեք (FinTech) լուծումները կայուն ֆինանսների հասանելիության բարձրացման գործում:",
            "Բլոկչեյն տեխնոլոգիայի կիրառումը կանաչ ֆինանսավորման թափանցիկության ապահովման համար:",
            "Թվային բանկինգի դերը բանկերի «ածխածնային հետքի» կրճատման գործում:",
            "Ոչ ֆինանսական հաշվետվողականոթյան (Sustainability Reporting) դերը կազմակերպության վարկանիշի բարձրացման գործում:",
            "Գրինուոշինգի (GreenWashing) ռիսկերը ֆինանսական շուկաներում և դրանց կանխարգելման ուղիները:",
            "ՀՀ գյուղատնտեսության ոլորտում կատարված ներդրումների վերլուծությունը /վերջին 5 կամ 10 տարիների կտրվածքով/",
            "Ջերմատնային տնտեսությունների զարգացմանն ուղղված ներդրումների վերլուծություն ՀՀ-ում",
            "Ինտենսիվ այգեգործության ոլորտում կատարված ներդրումների վերլուծություն ՀՀ-ում",
            "Գյուղատնտեսութան ոլորտում վարկային տոկոսադրույքների սուբսիդավորման ծրագրերի արդյունքների վերլուծություն ՀՀ-ում",
            "Ագրովերամշակման ոլորտում պետական աջակցության ծրագրերի շրջանակում կատարված ներդրումների վերլուծություն ՀՀ-ում",
            "Գյուղատնտեսության ապահովագրության համակարգերի զարգացման միջազգային փորձի վերլուծությունը և տեղայնացումը ՀՀ-ում",
            "Գյուղատնտեսության ապահովագրության ծրագրի արդյունքների վերլուծություն ՀՀ-ում",

            "ՀՀ գուղատնտեսութան ոլորտոմ լիզինգային ծրագրերի տոկոսադրույքների սուբսիդավորման արդյունքների վերլուծությունը",
            "ՀՀ գյուղատնտեսության ոլորտում կլիմայական ռիսկերի հարմարվողականության բարձրացմանն ուղղված ներդրումների վերլուծությունը",
            "ՀՀ-ում կանաչ պարտատոմսերը որպես նորարարական էկոլոգիական նախագծերի ֆինանսավորման գործիք (ՀՀ բանկի օրինակով):",
            "Վենչուրային կապիտալի դերը կլիմաական տեխնոլոգիաների (ClimateTech) ստարտափերի զարգացման գործում:",
            "Պետություն-մասնավոր գործընկերոթյան մոդելները շրջանաձն տնտեսության նորարարական ենթակառուցվածքների ֆինանսավորման գործընթացում:",
            "Բնապահպանական, սոցիաական և կառավարչական (ESG) չափանիշների ազդեցությունը առևտրային բանկերի վարկային պորտֆելի վրա:",
            "Իմպակտ ներդրումների (Impact Investing) հեռանկարները կանաչ տնտեսության անցման համատեքստում:",
            "Ապակենտրոնացված ֆինանսների (DeFi) և բլոկչեյն տեխնոլոգիաների կիրառումը կանաչ էներգետիկայի նախագծերի ֆինանսավորման մեջ:",
            "Կանաչ հարկման և սուբսիդավորման քաղաքականության արդյունավետությունը նորարարական տեխնոլոգիաների ներդրման խթանման գործընթացում:",
            "էկոլոգիական նորարարությունների ֆինանսավորման հիմնախնդիրները և դրանց հաղթահարման ուղիները զարգացող երկրներում:",
            "Միջազգային ֆինանսական կազմակերպությունների (Համաշխարհային բանկ, ՎԶԵԲ և այլն) դերը կանաչ տնտեսության ֆինանսավորման գործընթացում:",
            "Crowdfunding-ը (Համադրամահավաքը) որպես կանաչ ստարտափների ֆինանսավորման այլընտրանքային աղբյուր:",

            "ESG չափանիշների ինտեգրման խնդիրները հայական ընկերությունների կորպորատիվ կառավարման համակարգում",

            "Բանկերի և կապիտալի շուկաների մրցակցությունը տնտեսության ֆինանսավորման մեջ",
            "Հայաստանի ֆոնդային բորսայի զարգացման հիմնախնդիրները և ռազմավարական ուղղությունները",
            "Ֆոնդային բորսաների թվային տրանսֆորմացիան և առևտրային հարթակների տեխնոլոգիական զարգացումը",
            "Թոքենիզացված ակտիվների պահառության ինստիտուցիոնալ մոդելները",
            "Թոքենիզացված ակտիվների դերը ներդրումային շուկաների թվայնացման գործընթացում:",
            "ՀՀ արժեթղթերի շուկայի ենթակառուցվածքային համակարգերի զարգացման ռազմավարական ուղղությունները",
            "Հիփոթեքային պարտատոմսերի շուկայի զարգացման հնարավորությունները ՀՀ-ում",
            "Հայաստանում ոչ բանկային ֆինանսական միջնորդության զարգացման հեռանկարները",
            "ՀՀ ֆինանսական համակարգի կայոնոթյան և արժեթղթերի շուկայի փոխազդեցության հիմնահարցերը",
            "Բորսայական ֆոնդեր (ETF) զարգացման առանձնահատկություններ ն հեռանկարները ՀՀ-ում",
            "Միջազգային արժեթղթերի շուկաներին ինտեգրման ՀՀ հնարավորությունները ն սահմանափակումները",
            "Գնաճի, տոկոսադրուքների և ակտիվների գների փոխազդեցությունը կապիտալի շուկաներում",
            "Ապակենտրոնացված թվային հարթակների միջոցով քրաուդֆանդինգի և վենչուրային ֆինանսավորման արդի մոդելները",
            "Ֆինանսական ռիսկերի կառավարման և ֆինանսական կայունության ապահովման հիմնախնդիրները ՀՀ-ում",
            "Եվրոպարտատոմսեր շուկաների զարգացման արդի միտումնեը և ՀՀ հիմնախնդիրները:",
            "ՀՀ առևտրային բանկերի ներդրումային պորտֆելի կառավարման հիմնախնդիրները",
            "ՀՀ ֆինանսական շուկայում ներդրողների վարքագծի վրա ազդող հիմնական գործոնների վերլուծությունը",
            "Ֆինանսական և տնտեսական պարբերաշրջանների փոխազդեցության հիմնախնդիրները ՀՀ-ում",
            "Քրաուդֆանդինգի իրականացման արդի միտումները և զարգացման հեռանկարները ՀՀ-ում",
            "Հայաստանի Հանրապետության արժեթղթերի շուկայի կառուցվածքային բնութագրերը ն զարգացման համակարգային սահմանափակումները",
            "Արժեթղթերի շուկայի խորության և իրացվելիության ազդեցությունը տնտեսական աճի վրա. Հայաստանի Հանրապետության փորձը",
            "Կապիտալի շուկայի զարգացման դերը ՀՀ տնտեսության ֆինանսավորման գործընթացում:"
        ];


        // Custom Modal Logic
        const customModal = document.getElementById('customModal');
        const modalTitle = document.getElementById('modalTitle');
        const modalMessage = document.getElementById('modalMessage');
        const modalBtnCancel = document.getElementById('modalBtnCancel');
        const modalBtnConfirm = document.getElementById('modalBtnConfirm');

        let modalConfirmCallback = null;

        function showModal(title, message, isAlert = false, confirmCallback = null) {
            modalTitle.textContent = title;
            modalMessage.textContent = message;

            if (isAlert) {
                modalBtnCancel.style.display = 'none';
                modalBtnConfirm.textContent = 'Լավ';
            } else {
                modalBtnCancel.style.display = 'block';
                modalBtnCancel.textContent = 'Չեղարկել';
                modalBtnConfirm.textContent = 'Հաստատել';
            }

            modalConfirmCallback = confirmCallback;
            customModal.classList.remove('hidden');
        }

        function hideModal() {
            customModal.classList.add('hidden');
            modalConfirmCallback = null;
        }

        modalBtnCancel.addEventListener('click', hideModal);
        modalBtnConfirm.addEventListener('click', () => {
            if (modalConfirmCallback) modalConfirmCallback();
            hideModal();
        });

        document.addEventListener('DOMContentLoaded', () => {
            const tableBody = document.getElementById('themesBody');
            const searchInput = document.getElementById('searchInput');
            const noResults = document.getElementById('noResults');
            const tableElement = document.getElementById('themesTable');

            let themesData = [];
            let globalSelections = {};

            async function getSelections() {
                try {
                    const response = await fetch('http://localhost:8000/api/selections');
                    if (response.ok) {
                        return await response.json();
                    }
                } catch(e) {
                    console.error("Failed to load global selections:", e);
                }
                return {};
            }

            async function saveSelection(themeId, fullName) {
                try {
                    await fetch('http://localhost:8000/api/selections', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ themeId: themeId, studentName: fullName, action: 'save' })
                    });
                    globalSelections[themeId] = fullName;
                } catch (e) {
                    console.error("Failed to save selection to server:", e);
                }
            }

            async function removeSelection(themeId) {
                try {
                    await fetch('http://localhost:8000/api/selections', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ themeId: themeId, action: 'delete' })
                    });
                    delete globalSelections[themeId];
                    return true;
                } catch (e) {
                    console.error("Failed to remove selection from server:", e);
                }
                return false;
            }

            async function initializeData() {
                if (typeof LOCAL_THEMES_DATA !== 'undefined') {
                    themesData = LOCAL_THEMES_DATA.map((theme, index) => ({
                        id: index + 1,
                        text: theme
                    }));
                    
                    globalSelections = await getSelections();
                    renderTable(themesData);
                } else {
                    tableBody.innerHTML = `<tr><td colspan="3" style="text-align:center; color: red;">Տվյալների բեռնման սխալ:</td></tr>`;
                }
            }
            
            initializeData();

            function renderTable(dataToRender) {
                tableBody.innerHTML = '';
                const selections = globalSelections;

                if (dataToRender.length === 0) {
                    tableElement.style.display = 'none';
                    noResults.classList.remove('hidden');
                    return;
                }

                tableElement.style.display = 'table';
                noResults.classList.add('hidden');

                dataToRender.forEach(theme => {
                    const tr = document.createElement('tr');
                    const isLocked = !!selections[theme.id];
                    const studentName = isLocked ? selections[theme.id] : '';

                    tr.innerHTML = `
                    <td class="col-id">${theme.id}</td>
                    <td class="col-theme">${escapeHtml(theme.text)}</td>
                    <td class="col-student" id="student-cell-${theme.id}">
                        ${isLocked ? `
                            <div class="locked-name-display">
                                <span class="name-text">${escapeHtml(studentName)}</span>
                                <div class="locked-indicator" title="Հաստատված է">
                                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                                        <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                                    </svg>
                                </div>
                            </div>
                        ` : `
                            <div class="student-input-container">
                                <input type="text" 
                                       class="student-input" 
                                       placeholder="Ներմուծեք ձեր անունն ու ազգանունը" 
                                       data-id="${theme.id}">
                                
                                <button class="confirm-btn" data-id="${theme.id}" title="Հաստատել ընտրությունը">
                                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                        <polyline points="20 6 9 17 4 12"></polyline>
                                    </svg>
                                </button>
                            </div>
                        `}
                    </td>
                `;
                    tableBody.appendChild(tr);
                });

                attachEventListeners();
            }

            function attachEventListeners() {
                const confirmButtons = document.querySelectorAll('.confirm-btn');

                confirmButtons.forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        const themeId = btn.getAttribute('data-id');
                        const input = document.querySelector(`input[data-id="${themeId}"]`);
                        const name = input.value.trim();

                        if (name.length < 3) {
                            showModal('Ուշադրություն', 'Խնդրում ենք մուտքագրել ձեր ամբողջական անունը և ազգանունը:', true);
                            input.focus();
                            return;
                        }

                        showModal('Հաստատում', `Համոզվա՞ծ եք, որ ցանկանում եք ընտրել այս թեման որպես "${name}": Այս գործողությունը անդառնալի է:`, false, async () => {
                            await saveSelection(themeId, name);
                            lockTheme(themeId, name);
                        });
                    });
                });

                const inputs = document.querySelectorAll('.student-input');
                inputs.forEach(input => {
                    input.addEventListener('keypress', (e) => {
                        if (e.key === 'Enter') {
                            e.preventDefault();
                            const themeId = input.getAttribute('data-id');
                            const btn = document.querySelector(`button[data-id="${themeId}"]`);
                            if (btn) btn.click();
                        }
                    });
                });
            }

            function lockTheme(themeId, name) {
                const cell = document.getElementById(`student-cell-${themeId}`);
                if (cell) {
                    cell.innerHTML = `
                    <div class="locked-name-display">
                        <span class="name-text">${escapeHtml(name)}</span>
                        <div class="locked-indicator" title="Հաստատված է">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                                <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                            </svg>
                        </div>
                    </div>
                `;
                }
            }

            searchInput.addEventListener('input', async (e) => {
                const query = e.target.value.toLowerCase().trim();

                if (query.includes('clean')) {
                    const numberMatch = query.match(/\d+/);
                    if (numberMatch) {
                        const idToClean = parseInt(numberMatch[0], 10);
                        const success = await removeSelection(idToClean);
                        if (success) {
                            searchInput.value = '';
                            renderTable(themesData);
                            return;
                        }
                    }
                }

                if (!query) {
                    renderTable(themesData);
                    return;
                }
                const filtered = themesData.filter(theme =>
                    theme.text.toLowerCase().includes(query) ||
                    theme.id.toString() === query
                );
                renderTable(filtered);
            });

            // Theme Toggle Logic
            const themeToggle = document.getElementById('themeToggle');
            const sunIcon = document.querySelector('.sun-icon');
            const moonIcon = document.querySelector('.moon-icon');

            // Default is dark mode. If localStorage says 'light', apply 'light-mode'
            const currentTheme = localStorage.getItem('diplomaThemePreference');
            if (currentTheme === 'light') {
                document.documentElement.classList.add('light-mode');
                sunIcon.classList.remove('hidden');
                moonIcon.classList.add('hidden');
            }

            themeToggle.addEventListener('click', () => {
                document.documentElement.classList.toggle('light-mode');
                const isLightMode = document.documentElement.classList.contains('light-mode');

                if (isLightMode) {
                    sunIcon.classList.remove('hidden');
                    moonIcon.classList.add('hidden');
                    localStorage.setItem('diplomaThemePreference', 'light');
                } else {
                    sunIcon.classList.add('hidden');
                    moonIcon.classList.remove('hidden');
                    localStorage.setItem('diplomaThemePreference', 'dark');
                }
            });

            function escapeHtml(unsafe) {
                return unsafe
                    .replace(/&/g, "&amp;")
                    .replace(/</g, "&lt;")
                    .replace(/>/g, "&gt;")
                    .replace(/"/g, "&quot;")
                    .replace(/'/g, "&#039;");
            }
        });

    </script>
</body>

</html>
